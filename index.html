<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小圆脸 · 无口版</title>
<style>
  :root { --bg:#0a0a0c; --panel:#15161a; --line:#2a2c34; --txt:#c9d1d9; --accent:#e8edf5; }
  * { box-sizing: border-box; }
  body {
    margin:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center; gap:18px;
    min-height:100vh; padding:24px 12px;
  }
  h1 { font-size:16px; font-weight:600; letter-spacing:.05em; opacity:.85; margin:0; }
  .sub { font-size:12px; opacity:.45; margin:-10px 0 0; }
  .screen-wrap { border:6px solid #000; border-radius:18px; background:#000;
    box-shadow:0 12px 44px rgba(0,0,0,.7); line-height:0; }
  canvas { border-radius:12px; display:block; }
  .controls { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:680px; }
  button { background:var(--panel); color:var(--txt); border:1px solid var(--line);
    border-radius:8px; padding:8px 14px; font-size:13px; cursor:pointer; transition:.12s; }
  button:hover { border-color:var(--accent); color:#fff; }
  button.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:600; }
  .meta { font-size:12px; opacity:.45; max-width:560px; text-align:center; line-height:1.7; }
  code { background:var(--panel); padding:1px 6px; border-radius:4px; font-size:11px; }
</style>
</head>
<body>
  <h1>小圆脸 · 无口萌（黑白）</h1>
  <p class="sub">320×240 · NOMI 风 · 情绪全在眼睛里</p>

  <div class="screen-wrap">
    <canvas id="screen" width="320" height="240" style="width:640px;height:480px;"></canvas>
  </div>

  <div class="controls" id="moodBtns"></div>

  <p class="meta">
    没有嘴，全靠两只眼睛说话。待机也活着：随机眨眼 · 轻轻呼吸 · 偶尔左右瞟一眼。<br>
    每个表情 = 一组眼睛参数，就是将来固件里的 <code>MOODS</code> 表。
  </p>

<script>
const cv = document.getElementById('screen');
const ctx = cv.getContext('2d');
const W=320, H=240;

// ── 无口表情表：情绪全靠 eye 形 ───────────────────────────
// eye: round(圆睁) / wide(瞪大) / happy(◠◠弯) / sleepy(︶︶) / strain(眯) / squeeze(>< )
// glow:眼睛辉光  cheek:腮(灰点)  sweat:汗  tear:泪  bubble:台词
const MOODS = {
  happy:{ label:'◕‿◕ 平静/开心', eye:'round', eyeW:34, eyeH:42, cheek:true,
          blink:true, glow:14, bubble:'', breathe:1, name:'happy' },
  grin:{ label:'^‿^ 美滋滋',     eye:'happy', eyeW:40, eyeH:30, cheek:true,
          blink:false, glow:14, bubble:'', breathe:1, name:'grin' },
  busy:{ label:'>﹏< 忙/CPU烫',  eye:'strain', eyeW:34, eyeH:30, cheek:false,
          blink:true, glow:10, sweat:true, bubble:'clash 满载…', breathe:1.9, name:'busy' },
  surprised:{ label:'O o 发现新设备', eye:'wide', eyeW:46, eyeH:54, cheek:false,
          blink:true, glow:18, pop:true, bubble:'咦？新设备', breathe:1, name:'surprised' },
  offline:{ label:'×_× 断网', eye:'squeeze', eyeW:38, eyeH:38, cheek:false,
          blink:false, glow:8, tear:true, shake:true, bubble:'WAN 掉了…', breathe:1, name:'offline' },
  sleepy:{ label:'︶︶ 深睡/省电', eye:'sleepy', eyeW:38, eyeH:30, cheek:false,
          blink:false, glow:6, bubble:'zzz', breathe:0.5, name:'sleepy' },
};

let cur=MOODS.happy, t=0;
let blink=0, nextBlink=80;
let gaze=0, gazeTarget=0, nextGaze=160;
let popT=0;

const lerp=(a,b,k)=>a+(b-a)*k;

function setMood(k){
  cur=MOODS[k]; popT=cur.pop?1:0;
  document.querySelectorAll('#moodBtns button').forEach(b=>b.classList.toggle('active',b.dataset.k===k));
}
const bc=document.getElementById('moodBtns');
Object.entries(MOODS).forEach(([k,m])=>{
  const b=document.createElement('button'); b.textContent=m.label; b.dataset.k=k;
  b.onclick=()=>setMood(k); bc.appendChild(b);
});

// 画一只眼（白色发光），ox=该眼中心x
function drawEye(ox, oy, openK){
  const w=cur.eyeW, h=cur.eyeH*openK;
  ctx.save();
  ctx.shadowColor='rgba(235,242,255,.9)'; ctx.shadowBlur=cur.glow;
  ctx.fillStyle='#eef3fb'; ctx.strokeStyle='#eef3fb';
  ctx.lineCap='round'; ctx.lineJoin='round';
  if(h<3 && cur.eye==='round'){ // 眨眼瞬间 → 短横
    ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(ox-w*0.4,oy); ctx.lineTo(ox+w*0.4,oy); ctx.stroke();
    ctx.restore(); return;
  }
  switch(cur.eye){
    case 'round': case 'wide': { // 圆润竖胶囊 + 高光
      roundCapsule(ox,oy,w,h);
      ctx.fillStyle='rgba(0,0,0,.0)';
      // 高光：左上一小一大两个洞（用背景黑挖空更萌）
      ctx.save(); ctx.globalCompositeOperation='destination-out';
      ctx.beginPath(); ctx.arc(ox-w*0.16, oy-h*0.20, w*0.16, 0,7); ctx.fill();
      ctx.beginPath(); ctx.arc(ox+w*0.06, oy+h*0.08, w*0.08, 0,7); ctx.fill();
      ctx.restore();
      break; }
    case 'happy': { // ◠ 上弯
      ctx.lineWidth=7; ctx.beginPath();
      ctx.moveTo(ox-w/2,oy+6); ctx.quadraticCurveTo(ox,oy-h*0.7, ox+w/2,oy+6); ctx.stroke(); break; }
    case 'sleepy': { // ︶ 下弯（合眼）
      ctx.lineWidth=7; ctx.beginPath();
      ctx.moveTo(ox-w/2,oy-2); ctx.quadraticCurveTo(ox,oy+h*0.6, ox+w/2,oy-2); ctx.stroke(); break; }
    case 'strain': { // 眯：扁胶囊
      roundCapsule(ox,oy,w,Math.max(8,h*0.5)); break; }
    case 'squeeze': { // >< 受不了
      ctx.lineWidth=7;
      ctx.beginPath(); ctx.moveTo(ox-w/2,oy-h*0.4); ctx.lineTo(ox-w*0.05,oy); ctx.lineTo(ox-w/2,oy+h*0.4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ox+w/2,oy-h*0.4); ctx.lineTo(ox+w*0.05,oy); ctx.lineTo(ox+w/2,oy+h*0.4); ctx.stroke();
      break; }
  }
  ctx.restore();
}
function roundCapsule(ox,oy,w,h){
  const r=w/2;
  ctx.beginPath();
  ctx.moveTo(ox-r,oy-h/2+r);
  ctx.arc(ox, oy-h/2+r, r, Math.PI, 0);
  ctx.lineTo(ox+r, oy+h/2-r);
  ctx.arc(ox, oy+h/2-r, r, 0, Math.PI);
  ctx.closePath(); ctx.fill();
}

function draw(){
  t++;
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H); // 全黑屏

  // 眨眼
  nextBlink--;
  if(nextBlink<=0 && blink===0) blink=0.001;
  if(blink>0){ blink+=0.16; if(blink>=2){ blink=0; nextBlink=70+Math.floor(Math.random()*150);} }
  const blinkAmt = (cur.blink && blink>0) ? Math.sin(Math.min(blink,1)*Math.PI) : 0;
  const openK = 1-blinkAmt;

  // 左右瞟（gaze）
  nextGaze--;
  if(nextGaze<=0){ gazeTarget=(Math.random()*2-1)*10; nextGaze=140+Math.floor(Math.random()*200);
    setTimeout(()=>gazeTarget=0, 800); }
  gaze=lerp(gaze,gazeTarget,0.08);

  // 呼吸 / 抖 / 弹
  const by=Math.sin(t*0.05*cur.breathe)*2.4;
  let dx=gaze, dy=by;
  if(cur.shake) dx+=Math.sin(t*0.9)*2.6;
  if(popT>0) popT*=0.88;
  const sc=1+popT*0.14;

  const cx=W/2, cy=H/2-6;
  const gap=58; const oy=cy+dy;
  ctx.save(); ctx.translate(cx, cy); ctx.scale(sc,sc); ctx.translate(-cx,-cy);
  drawEye(cx-gap+dx, oy, openK);
  drawEye(cx+gap+dx, oy, openK);

  // 腮（黑白：极淡的灰圆）
  if(cur.cheek){
    ctx.fillStyle='rgba(220,228,240,.16)';
    ctx.beginPath(); ctx.arc(cx-gap-22+dx, oy+34, 13,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+gap+22+dx, oy+34, 13,0,7); ctx.fill();
  }
  ctx.restore();

  // 汗滴
  if(cur.sweat){
    const drop=(t*1.7)%66;
    ctx.fillStyle='rgba(235,242,255,.85)';
    const sx=cx+gap+44, sy=oy-34+drop;
    ctx.beginPath(); ctx.moveTo(sx,sy-9); ctx.quadraticCurveTo(sx+7,sy,sx,sy+7); ctx.quadraticCurveTo(sx-7,sy,sx,sy-9); ctx.fill();
  }
  // 泪
  if(cur.tear){
    ctx.fillStyle='rgba(180,210,255,.9)';
    for(const sgn of [-1,1]){
      const sx=cx+sgn*gap, sy=oy+24+(t*1.3+ (sgn>0?20:0))%40;
      ctx.beginPath(); ctx.moveTo(sx,sy-7); ctx.quadraticCurveTo(sx+5,sy,sx,sy+6); ctx.quadraticCurveTo(sx-5,sy,sx,sy-7); ctx.fill();
    }
  }

  // 台词气泡（极简白底）
  if(cur.bubble){
    ctx.font='13px -apple-system,"PingFang SC",sans-serif';
    const pad=9, tw=ctx.measureText(cur.bubble).width;
    const bw=tw+pad*2, bh=24, bx=W/2-bw/2, byy=H-32;
    ctx.fillStyle='rgba(238,243,251,.95)';
    rr(bx,byy,bw,bh,9); ctx.fill();
    ctx.beginPath(); ctx.moveTo(W/2-6,byy); ctx.lineTo(W/2,byy-7); ctx.lineTo(W/2+6,byy); ctx.fill();
    ctx.fillStyle='#000'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(cur.bubble, W/2, byy+bh/2+1); ctx.textAlign='start';
  }
  requestAnimationFrame(draw);
}
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

setMood('happy'); draw();
</script>
</body>
</html>
